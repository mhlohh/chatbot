<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>chatbot</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        background-color: black;
      }
      img{
        border-radius: 25px;
        margin-left: 10px;
        margin-right: 10px;
      }
      a{
        text-decoration: none;
        color:#494848;
        transition: font-size 0.3s,color 0.3s;
      }
      a:hover{
        font-size: 26px;
        color:white;
      }
      .app-container {
        max-width:700px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 90vh;
        background-color:#1d1d1d;
        margin-top: 50px;     
        margin-bottom: 50px; 
        border-radius: 20px;
        padding-left: 30px;
        padding-right: 30px;
        box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.404);
        transition: padding 0.52s, box-shadow 0.52s;
      }

      .app-container:hover{
        padding-top: 3px;
        padding-bottom: 3px;
        padding-left: 34px;
        padding-right: 34px;
        box-shadow: 0px 0px 40px rgba(255, 255, 255, 0.404);
      }

      .chat-messages-container {
        flex: 1;
        margin-top: 20px;
        overflow: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      .chat-input-container {
        display: flex;
        gap: 10px;
        margin-bottom: 60px;
        padding: 10px 0;
      }

      .chat-input {
        font-size: 16px;
        padding: 10px 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-left: 10px;
        margin-right: 10px;
        flex: 1;
        background-color: black;
        color: white;
        transition: padding 0.52s;
      }
      .chat-input:hover{
        padding: 12px 17px;
      }

      .send-button {
        background: #28a745;
        color: #fff;
        border: 0;
        font-size: 16px;
        padding: 10px 15px;
        border-radius: 10px;
        cursor: pointer;
        margin-right: 10px;
        transition: padding 0.52s,background-color,color 0.52s;
      }
      .send-button:hover{
        padding: 12px 17px; 
      }
      .send-button:active{
        background-color:rgba(49, 54, 49, 0.66);
        color:#494848;
      }

      .chat-message-user {
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
      }

      .chat-message-robot {
        display: flex;
        align-items: flex-start;
      }
      

      .chat-message-text {
        padding: 15px 20px;
        background: #444343;
        border-radius: 10px;
        margin-left: 10px;
        margin-right: 10px;
        margin-bottom: 20px;
        max-width: 300px;
        cursor: pointer;
        color:white;
        transition: padding 0.52s;
      }

      .chat-message-text:hover{
        padding: 20px 25px;
      }

      .chat-message-profile {
        width: 45px;
        height: auto;
      }


      /* hide scrollbar in WebKit */
      .chat-messages-container::-webkit-scrollbar {
        display: none;
      }

      .builder-name{
        color: white;
        font-weight: bold;
      }


    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src = "https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">


      function ChatbotInput({chatMessages,setChatMessages})
      {
        const [inputText,setInputText] = React.useState('');

       async function sendMessage()
        {
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID(),
            }];
          setChatMessages([
            ...newChatMessages,
                // This creates a temporary Loading... message.
                // Because we don't save this message in newChatMessages,
                // it will be remove later, when we add the response.
                {
                    message: 'Loading...',
                    sender: 'robot',
                    id: crypto.randomUUID()
                }
          ]);

          const response = await Chatbot.getResponseAsync(inputText);

          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID(),
            }
          ]);

        }

        function saveInputText(event)
        {
          setInputText(event.target.value);
        }
        function inputTextKey(event)
        {
          if(event.key === 'Enter')
          {
            sendMessage();
            setInputText('');
          }
          if(event.key === 'Escape')
          {
            setInputText('');
          }
        }
           
        return(
          <div
          className = "chat-input-container"
          >
            <input 
              className = "chat-input"
              type = "text" 
              placeholder = "Send a message to Chatbot" 
              onChange = {saveInputText}
              value = {inputText}
              onKeyDown = {inputTextKey}
             
            />

            <button
              onClick = {sendMessage}
              className = "send-button"
            >Send</button>
          </div>
        );
      }
      

      function ChatMessage({message, sender})
      {
        //const message = props.message;
        //const sender = props.sender;
        //const {message,sender} = props;
        /*if (sender === 'robot')
      {
        return (
          <div>
            <img src = "robot.png" width = "50"/>
            {message}
          </div>
        );
      }
        */
        return(
          <div
            className = {
              sender === 'user' 
              ? 'chat-message-user'
              :'chat-message-robot'
            }
          >
            {sender === 'robot' && (
              <img src = "robot.png" className = "chat-message-profile"/>
            )}
            <div className = "chat-message-text">
              {message}
            </div>    
            {sender === 'user' && (
              <img src = "profile.jpg" className = "chat-message-profile"/>
            )}
          </div>
        );

      }

      //def chat componets
      function ChatMessages({chatMessages})
      {
        

        return(
          <div
            className = "chat-messages-container"
          >
            {
              chatMessages.map((chatMessage)=> {
          return (
                  <ChatMessage 
                    message = {chatMessage.message}
                    sender = {chatMessage.sender}
                    key = {chatMessage.id}
                  />
                );
              })
            }
          </div>
        );
      }
      
      function App()
      {
        const [chatMessages,setChatMessages] = React.useState
        (
          [
            {
                  message: 'hello chatbot',
                  sender: 'user',
                  id: 'id1'
            },

            {
                  message: 'Hello! How can I help you?',
                  sender: 'robot',
                  id: 'id2'
            },

            {
                  message: 'can you get me todays date ?',
                  sender: 'user',
                  id: 'id3'
            },

            {
                  message: 'today is Setemper 27',
                  sender: 'robot',
                  id: 'id4'
            }

          ]
        );

        //const [chatMessages,setChatMessages] = array;
        //const chatMessages = array [0];
        //const setChatMessages = array[1];

        return(
         <div
            className = "app-container"
         >
            <ChatMessages 
              chatMessages = {chatMessages}
            />
            
             <ChatbotInput 
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
            <a href = "https://www.instagram.com/muhsilnr/" 
            target="_blank">Click here: Insta id: muhsilnr</a>
            <a href = "https://www.linkedin.com/in/muhsil-nr-028a51301/" 
              target="_blank">
                Click here: Linkedin
            </a>
            <a href = "https://github.com/mhlohh" 
            target="_blank"
            >Click here: GitHub</a>
            <p className = "builder-name">Build by Muhsil NR</p>

         </div>
        );
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
